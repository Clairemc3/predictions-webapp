services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    container_name: predictions-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./storage:/var/www/storage
      - ./bootstrap/cache:/var/www/bootstrap/cache
    environment:
      - APP_ENV=${APP_ENV:-local}
      - APP_DEBUG=${APP_DEBUG:-true}
      - APP_URL=${APP_URL:-http://localhost:8000}
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-predictions}
      - DB_USERNAME=${DB_USERNAME:-predictions}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - CACHE_STORE=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SEED_DATABASE=${SEED_DATABASE:-true}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - predictions

  nginx:
    image: nginx:alpine
    container_name: predictions-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - predictions

  mysql:
    image: mysql:8.0
    container_name: predictions-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-predictions}
      MYSQL_USER: ${DB_USERNAME:-predictions}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-root}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - predictions

  redis:
    image: redis:7-alpine
    container_name: predictions-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - redis_data:/data
    networks:
      - predictions

  node:
    build:
      context: .
      dockerfile: Dockerfile
      target: node
    container_name: predictions-node
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - /var/www/node_modules
    command: npm run dev
    ports:
      - "5173:5173"
    networks:
      - predictions

networks:
  predictions:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
